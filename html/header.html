<script>
  function highlightSearch() {
    const keyword = document.getElementById("searchInput").value.trim().toLowerCase();
    const container = document.body;

    removeHighlights(container);

    if (keyword === "") return;

    highlightInElement(container, keyword);
  }

  function removeHighlights(element) {
    const spans = element.querySelectorAll('span.highlight');
    spans.forEach(span => {
      const parent = span.parentNode;
      parent.replaceChild(document.createTextNode(span.textContent), span);
      parent.normalize(); // دمج النصوص المجاورة
    });
  }

  function highlightInElement(element, keyword) {
    for (let node of element.childNodes) {
      if (node.nodeType === 3) {
        const text = node.nodeValue.toLowerCase();
        const index = text.indexOf(keyword);
        if (index !== -1 && node.nodeValue.trim() !== "") {
          const span = document.createElement("span");
          const originalText = node.nodeValue;
          const before = document.createTextNode(originalText.slice(0, index));
          const match = document.createElement("span");
          match.className = "highlight";
          match.textContent = originalText.slice(index, index + keyword.length);
          const after = document.createTextNode(originalText.slice(index + keyword.length));

          const fragment = document.createDocumentFragment();
          fragment.appendChild(before);
          fragment.appendChild(match);
          fragment.appendChild(after);

          node.parentNode.replaceChild(fragment, node);

          // البحث المتكرر في العنصر نفسه
          highlightInElement(element, keyword);
          break;
        }
      } else if (node.nodeType === 1 && node.nodeName !== "SCRIPT" && node.nodeName !== "STYLE") {
        highlightInElement(node, keyword);
      }
    }
  }
</script>

    <style>
